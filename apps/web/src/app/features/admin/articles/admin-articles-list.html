<div class="aal">
  <!-- Shared page header (canonical admin top) with filters + primary action -->
  <app-admin-page-header title="Статті" [subtitle]="total() + ' записів'">
    <p-select
      [(ngModel)]="status"
      [options]="statusOptions"
      optionLabel="label"
      optionValue="value"
      (onChange)="onStatusChange()"
      placeholder="Статус"
      [style]="{ minWidth: '12rem' }"
    />
    <input
      pInputText
      type="text"
      [(ngModel)]="search"
      placeholder="Пошук…"
      class="aal__search"
      (keyup.enter)="onSearchEnterOrBlur()"
      (blur)="onSearchEnterOrBlur()"
    />
    <p-button
      label="+ Нова стаття"
      [routerLink]="['/admin/articles/new']"
      severity="primary"
    />
  </app-admin-page-header>

  <!-- Table panel -->
  <div class="aal__panel aal__panel--flush aal__panel--scroll">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [paginator]="true"
      [rows]="20"
      [totalRecords]="total()"
      [loading]="loading()"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Заголовок</th>
          <th>Статус</th>
          <th>Опубліковано</th>
          <th>Оновлено</th>
          <th>Дії</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-a>
        <tr>
          <td>
            <span class="aal__name">{{ a.title }}</span>
            <br />
            <small class="aal__slug">{{ a.slug }}</small>
          </td>
          <td>
            <p-tag
              [severity]="statusSeverity(a.status)"
              [value]="statusLabel(a.status)"
              [rounded]="true"
            />
          </td>
          <td>{{ a.publishedAt ? (a.publishedAt | date:'dd.MM.yyyy') : '—' }}</td>
          <td>{{ a.updatedAt | date:'dd.MM.yyyy HH:mm' }}</td>
          <td class="aal__actions">
            <p-button
              icon="pi pi-pencil"
              severity="secondary"
              rounded
              size="small"
              [routerLink]="['/admin/articles', a.id]"
              pTooltip="Редагувати"
              tooltipPosition="top"
            />
            <p-button
              icon="pi pi-trash"
              severity="danger"
              text
              rounded
              size="small"
              (onClick)="confirmDelete(a)"
              pTooltip="Видалити"
              tooltipPosition="top"
            />
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5">
            <div class="aal__empty">
              <span class="aal__empty-icon">📰</span>
              <p class="aal__empty-title">Нічого не знайдено</p>
              <p class="aal__empty-sub">У цьому фільтрі поки що порожньо.</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmdialog />
