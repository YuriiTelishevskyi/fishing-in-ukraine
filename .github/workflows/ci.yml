name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # build — install dependencies and compile all packages (shared → api → web)
  # Tests are deferred by project decision; no test step is intentional.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (shared → api → web)
        # packages/shared prepare script runs automatically during `npm ci`
        # (workspace lifecycle), so the explicit build order below is safe.
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # docker — smoke-build both images to verify Dockerfiles stay valid.
  # Runs only on pushes to main (not on PRs from forks — no registry needed).
  # Images are NOT pushed: the owner hasn't chosen a registry yet.
  # Uncomment and fill in the push section below once a registry is selected.
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (smoke, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: fishing-api:ci

      - name: Build Web image (smoke, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: fishing-web:ci

      # ── Registry push (uncomment when ready) ───────────────────────────
      # - name: Log in to registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io               # or: registry.hub.docker.com
      #     username: ${{ github.actor }}    # or: ${{ secrets.REGISTRY_USER }}
      #     password: ${{ secrets.GITHUB_TOKEN }}  # or: ${{ secrets.REGISTRY_PASSWORD }}
