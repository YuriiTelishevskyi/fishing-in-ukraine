services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fishing
      POSTGRES_PASSWORD: fishing
      POSTGRES_DB: fishing_db
    ports:
      # host port 5433 avoids conflict with another local postgres on 5432
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fishing -d fishing_db']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
