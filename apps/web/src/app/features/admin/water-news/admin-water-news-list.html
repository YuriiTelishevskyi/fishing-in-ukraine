<div class="awnl">
  <!-- Shared page header (canonical admin top) with the primary action -->
  <app-admin-page-header title="Новини та зариблення" [subtitle]="total() + ' записів'">
    <p-button
      label="+ Додати новину"
      [routerLink]="['/admin/water-news/new']"
      severity="primary"
    />
  </app-admin-page-header>

  <!-- Table panel -->
  <div class="awnl__panel awnl__panel--flush awnl__panel--scroll">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [paginator]="true"
      [rows]="20"
      [totalRecords]="total()"
      [loading]="loading()"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Дата</th>
          <th>Тип</th>
          <th>Водойма</th>
          <th>Заголовок</th>
          <th>Дії</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-n>
        <tr>
          <td>{{ n.date | date:'dd.MM.yyyy' }}</td>
          <td>
            <p-tag
              [severity]="typeSeverity(n.type)"
              [value]="typeLabel(n.type)"
              [rounded]="true"
            />
          </td>
          <td>{{ n.water.name }}</td>
          <td>
            <span class="awnl__title">{{ n.title }}</span>
          </td>
          <td class="awnl__actions">
            <p-button
              icon="pi pi-pencil"
              severity="secondary"
              rounded
              size="small"
              [routerLink]="['/admin/water-news', n.id]"
              pTooltip="Редагувати"
              tooltipPosition="top"
            />
            <p-button
              icon="pi pi-trash"
              severity="danger"
              text
              rounded
              size="small"
              (onClick)="confirmDelete(n)"
              pTooltip="Видалити"
              tooltipPosition="top"
            />
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5">
            <div class="awnl__empty">
              <span class="awnl__empty-icon">📰</span>
              <p class="awnl__empty-title">Нічого не знайдено</p>
              <p class="awnl__empty-sub">Поки що немає новин чи зариблень.</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmdialog />
