@if (visible()) {
  <div class="cookie-banner" role="region" aria-label="cookie consent">
    <p class="cookie-banner__text">{{ 'consent.text' | transloco }}</p>
    <div class="cookie-banner__actions">
      <button type="button" class="cookie-banner__btn cookie-banner__btn--accept" (click)="accept()">
        {{ 'consent.accept' | transloco }}
      </button>
      <button type="button" class="cookie-banner__btn cookie-banner__btn--decline" (click)="decline()">
        {{ 'consent.decline' | transloco }}
      </button>
    </div>
  </div>
}
