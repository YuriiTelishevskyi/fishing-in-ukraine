<div class="awnl">
  <!-- Page header row -->
  <div class="awnl__page-header">
    <div class="awnl__page-title-group">
      <h1 class="awnl__page-title">Новини та зариблення</h1>
      <span class="awnl__page-subtitle">{{ total() }} записів</span>
    </div>
    <p-button
      label="+ Додати новину"
      [routerLink]="['/admin/water-news/new']"
      severity="primary"
    />
  </div>

  <!-- Table panel -->
  <div class="awnl__panel awnl__panel--flush awnl__panel--scroll">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [paginator]="true"
      [rows]="20"
      [totalRecords]="total()"
      [loading]="loading()"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Дата</th>
          <th>Тип</th>
          <th>Водойма</th>
          <th>Заголовок</th>
          <th>Дії</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-n>
        <tr>
          <td>{{ n.date | date:'dd.MM.yyyy' }}</td>
          <td>
            <p-tag
              [severity]="typeSeverity(n.type)"
              [value]="typeLabel(n.type)"
            />
          </td>
          <td>{{ n.water.name }}</td>
          <td>
            <span class="awnl__title">{{ n.title }}</span>
          </td>
          <td class="awnl__actions">
            <p-button
              icon="pi pi-pencil"
              severity="secondary"
              [text]="true"
              [routerLink]="['/admin/water-news', n.id]"
              pTooltip="Редагувати"
            />
            <p-button
              icon="pi pi-trash"
              severity="danger"
              [text]="true"
              (onClick)="confirmDelete(n)"
              pTooltip="Видалити"
            />
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="awnl__empty">Нічого не знайдено</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmdialog />
