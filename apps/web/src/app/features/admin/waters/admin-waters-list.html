<div class="awl">
  <!-- Shared page header (canonical admin top) with filters + primary action -->
  <app-admin-page-header title="Водойми" [subtitle]="total() + ' записів'">
    <p-select
      [(ngModel)]="status"
      [options]="statusOptions"
      optionLabel="label"
      optionValue="value"
      (onChange)="onStatusChange()"
      placeholder="Статус"
      [style]="{ minWidth: '12rem' }"
    />
    <input
      pInputText
      type="text"
      [(ngModel)]="search"
      placeholder="Пошук…"
      class="awl__search"
      (keyup.enter)="onSearchEnterOrBlur()"
      (blur)="onSearchEnterOrBlur()"
    />
    <p-button
      label="+ Нова водойма"
      [routerLink]="['/admin/waters/new']"
      severity="primary"
    />
  </app-admin-page-header>

  <!-- Table panel -->
  <div class="awl__panel awl__panel--flush awl__panel--scroll">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [paginator]="true"
      [rows]="20"
      [totalRecords]="total()"
      [loading]="loading()"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Назва</th>
          <th>Область</th>
          <th>Статус</th>
          <th>Перевірена</th>
          <th>Преміум</th>
          <th>Фото</th>
          <th>Оновлено</th>
          <th>Дії</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-w>
        <tr>
          <td>
            <span class="awl__name">{{ w.name }}</span>
            <br />
            <small class="awl__slug">{{ w.slug }}</small>
          </td>
          <td>{{ w.regionName }}</td>
          <td>
            <p-tag
              [severity]="statusSeverity(w.status)"
              [value]="statusLabel(w.status)"
              [rounded]="true"
            />
          </td>
          <td>
            @if (w.verified) {
              <p-tag severity="success" value="✓ Так" [rounded]="true" />
            } @else {
              <span class="awl__muted">—</span>
            }
          </td>
          <td>
            @if (w.isPremium) {
              <p-tag severity="warn" [value]="'⭐ ' + (w.premiumUntil ? 'до ' + (w.premiumUntil | date:'dd.MM.yyyy') : '∞')" [rounded]="true" />
            } @else {
              <span class="awl__muted">—</span>
            }
          </td>
          <td>{{ w.media.length }}</td>
          <td>{{ w.updatedAt | date:'dd.MM.yyyy HH:mm' }}</td>
          <td class="awl__actions">
            <p-button
              icon="pi pi-pencil"
              severity="secondary"
              rounded
              size="small"
              [routerLink]="['/admin/waters', w.id]"
              pTooltip="Редагувати"
              tooltipPosition="top"
            />
            <p-button
              icon="pi pi-trash"
              severity="danger"
              text
              rounded
              size="small"
              (onClick)="confirmDelete(w)"
              pTooltip="Видалити"
              tooltipPosition="top"
            />
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="8">
            <div class="awl__empty">
              <span class="awl__empty-icon">💧</span>
              <p class="awl__empty-title">Нічого не знайдено</p>
              <p class="awl__empty-sub">У цьому фільтрі поки що порожньо.</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmdialog />
